name: Generate Daily Pixel Art

on:
  schedule:
    # Tous les jours à 6h00 UTC (adapte l'heure si tu veux)
    - cron: '0 6 * * *'
  workflow_dispatch:      # permet de le lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Générer le pixel art
        run: python generate_art.py

      - name: Commit et push si changement
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: art du jour 🎨"
          file_pattern: art/today.svg
